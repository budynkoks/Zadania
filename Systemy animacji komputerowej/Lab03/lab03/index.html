<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 100;
            min-width: 250px;
        }

        #controls h3 {
            margin-bottom: 15px;
            text-align: center;
            color: #ff6b6b;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .control-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .control-group .value {
            text-align: right;
            font-size: 12px;
            color: #aaa;
        }

        #stats {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            z-index: 100;
        }

        #stats div {
            margin-bottom: 5px;
        }

    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="controls">
        
        <div class="control-group">
            <label>Grawitacja: <span id="gravityValue">0.08</span></label>
            <input type="range" id="gravity" min="0" max="0.2" step="0.01" value="0.08">
        </div>

        <div class="control-group">
            <label>Liczba cząsteczek: <span id="particleCountValue">150</span></label>
            <input type="range" id="particleCount" min="0" max="4000" step="10" value="150">
        </div>

        <div class="control-group">
            <label>Interwał auto-startu (s): <span id="autoIntervalValue">2</span></label>
            <input type="range" id="autoInterval" min="0.1" max="5" step="0.2" value="2">
        </div>

    </div>

    <div id="stats">
        <div>FPS: <span id="fps">0</span></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
